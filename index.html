<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ 현정pick점메추</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: #FFF9E6; 
}

.card {
    padding-top: 50px;
    max-width: 650px;
    margin: 0 auto;
}

h1 {
    font-size: 36px;
    color: #331B05;
    margin-bottom: 5px;
}

p {
    font-size: 16px;
    color: #666;
    margin-bottom: 25px;
}

/* 탭 버튼 스타일링 */
.lunch, .dinner {
    font-size: 18px;
    font-weight: bold;
    padding: 12px 35px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.lunch:hover { transform: scale(1.05); }
.dinner:hover { transform: scale(1.05); }
.lunch { background: #ffd43b; color: #331B05; }
.dinner { background: #ff8787; color: white; }

/* 🎰 3구 슬롯머신 골드 프레임 본체 */
.slot-machine-frame {
    display: inline-flex;
    background: linear-gradient(145deg, #FFC033, #D49000);
    border: 8px solid #EAA816;
    border-radius: 35px;
    padding: 25px;
    margin-top: 25px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 15px 25px rgba(0,0,0,0.15);
    position: relative;
    gap: 15px; 
    align-items: center;
}

/* 테두리 전구 조명 효과 */
.slot-machine-frame::before {
    content: '';
    position: absolute;
    top: -4px; left: -4px; right: -4px; bottom: -4px;
    border: 2px dashed white;
    border-radius: 30px;
    opacity: 0.8;
    animation: blink 0.5s infinite alternate;
}

/* 개별 슬롯 디스플레이 윈도우 창 */
.reel-window {
    width: 140px;
    height: 140px; /* 이미지 수용을 위해 높이 조정 */
    background: #F9F9F9;
    border: 5px solid #63432A;
    border-radius: 15px;
    box-shadow: inset 0 6px 10px rgba(0,0,0,0.15);
    overflow: hidden; 
    position: relative;
    transition: all 0.3s;
}

/* 위아래로 연속 스크롤 롤링되는 내부 트랙 줄 */
.reel-strip {
    position: absolute;
    width: 100%;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    transform: translateY(0px);
}

/* 릴 안의 개별 메뉴 아이템 칸 크기 규격 */
.menu-item {
    height: 140px;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 16px;
    font-weight: 800;
    color: #4A4A4A;
    box-sizing: border-box;
    white-space: nowrap;
    background: #FFF;
    border-bottom: 1px solid #EEE;
}

/* 릴 내부 입체감 있는 음식 사진 스타일 */
.menu-item img {
    width: 85px;
    height: 70px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 5px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* 🔥 최종 멈췄을 때 가운데(2번째) 슬롯 창 골드 발광 */
.reel-window.center-hit {
    border-color: #FFD43B;
    background: #FFF;
    box-shadow: 0 0 25px #FFD43B, inset 0 0 10px #FFD43B;
}
.reel-window.center-hit .menu-item {
    color: #FF3E3E; 
    font-size: 18px;
    transform: scale(1.03);
}

/* 양 옆의 흐릿하게 죽는 보조 슬롯 스타일 */
.reel-window.side-fade {
    opacity: 0.5;
}

/* 상황 상태 안내판 */
#result-msg {
    margin-top: 25px;
    font-size: 24px;
    font-weight: bold;
    color: #8E5A36;
    min-height: 35px;
}

/* 하단 큰 최종 결과 텍스트 */
#final-banner {
    font-size: 42px;
    font-weight: 900;
    color: #FF3E3E;
    margin-top: 25px;
    display: none;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes blink {
    0% { border-color: white; opacity: 0.5; }
    100% { border-color: #FFD43B; opacity: 1; }
}
@keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<div class="card">
    <h1>🍽️ 현정pick점메추 🍽️</h1>
    <p>배고프면 눌러라 😋</p>

    <button class="lunch" onclick="lunch()">🍱 점메추</button>
    <button class="dinner" onclick="dinner()">🍖 저메추</button>

    <!-- 상황 상태 안내판 -->
    <div id="result-msg">🤔 메뉴를 고민중...</div>

    <!-- 🎰 3구 이미지 슬롯머신 기계 구조 -->
    <div>
        <div class="slot-machine-frame">
            <div class="reel-window" id="win1">
                <div class="reel-strip" id="reel1"></div>
            </div>
            <div class="reel-window" id="win2">
                <div class="reel-strip" id="reel2"></div>
            </div>
            <div class="reel-window" id="win3">
                <div class="reel-strip" id="reel3"></div>
            </div>
        </div>
    </div>

    <!-- 최종 결과 배너 -->
    <div id="final-banner">✨ <span id="final-food">김치찌개</span> ✨</div>
</div>

<script>
// 📸 각 음식별 매칭되는 실제 고화질 입체 이미지 오브젝트 데이터 풀셋 구성
const lunchFoods = [
    { name: "제육볶음", img: "https://unsplash.com" },
    { name: "돈까스", img: "https://unsplash.com" },
    { name: "국밥", img: "https://unsplash.com" },
    { name: "김치찌개", img: "https://unsplash.com" },
    { name: "냉면", img: "https://unsplash.com" },
    { name: "햄버거", img: "https://unsplash.com" },
    { name: "짜장면", img: "https://unsplash.com" },
    { name: "짬뽕", img: "https://unsplash.com" },
    { name: "칼국수", img: "https://unsplash.com" },
    { name: "비빔밥", img: "https://unsplash.com" }
];

const dinnerFoods = [
    { name: "치킨", img: "https://unsplash.com" },
    { name: "피자", img: "https://unsplash.com" },
    { name: "삼겹살", img: "https://unsplash.com" },
    { name: "족발", img: "https://unsplash.com" },
    { name: "닭갈비", img: "https://unsplash.com" },
    { name: "마라탕", img: "https://unsplash.com" },
    { name: "곱창", img: "https://unsplash.com" },
    { name: "회", img: "https://unsplash.com" },
    { name: "떡볶이", img: "https://unsplash.com" },
    { name: "샤브샤브", img: "https://unsplash.com" }
];

const itemHeight = 140; // 조절된 슬롯 박스 고정 너비 규격 정의
let isRunning = false;

/* 🎰 수직 무한 이미지 롤링 및 점진 감속 메커니즘 엔진 */
function slotSpin(list, emoji, title) {
    if (isRunning) return; 
    isRunning = true;

    let msgBox = document.getElementById("result-msg");
    let finalBanner = document.getElementById("final-banner");
    let finalFood = document.getElementById("final-food");
    
    let w1 = document.getElementById("win1");
    let w2 = document.getElementById("win2");
    let w3 = document.getElementById("win3");
    
    let r1 = document.getElementById("reel1");
    let r2 = document.getElementById("reel2");
    let r3 = document.getElementById("reel3");

    // 매칭 효과 리셋 초기화
    w1.classList.remove("side-fade");
    w2.classList.remove("center-hit");
    w3.classList.remove("side-fade");
    finalBanner.style.display = "none";
    
    msgBox.innerText = `⏳ 슬롯 돌아가는 중...`;

    // 이미지 및 텍스트 돔 노드 생성 바인딩
    const extendedList = [...list, ...list, ...list, ...list];
    [r1, r2, r3].forEach(reel => {
        reel.innerHTML = '';
        extendedList.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            
            const img = document.createElement('img');
            img.src = item.img;
            img.alt = item.name;
            
            const span = document.createElement('span');
            span.textContent = item.name;
            
            div.appendChild(img);
            div.appendChild(span);
            reel.appendChild(div);
        });
        reel.style.transform = "translateY(0px)";
    });

    const totalDuration = 2500; 
    const startTime = Date.now();
    let currentYPositions =;

    function spin() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / totalDuration, 1);
        
        // 📈 점점 느려지는 물리 제동 4차식 곡선 수식 매핑 (Ease-Out)
        const easeOutProgress = 1 - Math.pow(1 - progress, 4);
        const speedFactor = 1 - easeOutProgress;
        
        // 초반엔 글자와 이미지가 흐릿할 정도로 엄청 빠르게 이동하는 프레임 스텝 보정
        const scrollStep = 15 + (speedFactor * 75); 

        for(let i=0; i<3; i++) {
            currentYPositions[i] -= scrollStep;
            
            const maxScroll = -(list.length * 2 * itemHeight);
            if (currentYPositions[i] < maxScroll) {
                currentYPositions[i] += (list.length * itemHeight);
            }
        }
        
        r1.style.transform = `translateY(${currentYPositions[0]}px)`;
        r2.style.transform = `translateY(${currentYPositions[1]}px)`;
        r3.style.transform = `translateY(${currentYPositions[2]}px)`;

        if (elapsed < totalDuration) {
            requestAnimationFrame(spin);
        } else {
            // 최종 시간 도달 시 완전 정지 및 중앙 정렬 피팅 계산
            const final = list[Math.floor(Math.random() * list.length)];
            const side1 = list[Math.floor(Math.random() * list.length)];
            const side3 = list[Math.floor(Math.random() * list.length)];
            
            const finalIndex = list.findIndex(item => item.name === final.name) + list.length;
            const side1Index = list.findIndex(item => item.name === side1.name) + list.length;
            const side3Index = list.findIndex(item => item.name === side3.name) + list.length;
